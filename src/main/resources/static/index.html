<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablica Kanban</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Tablica Kanban</h1>

<div class="controls">
  <div class="main-controls">
    <input type="text" id="taskInput" placeholder="Dodaj nowe zadanie...">
    <button id="addTaskBtn">Dodaj zadanie</button>
  </div>
  <div class="secondary-controls">
    <a href="users.html" class="users-button">Zarządzanie użytkownikami</a>
  </div>
  <div class="wip-control">
    <label for="wipLimit">Limit zadań "In Progress":</label>
    <input type="number" id="wipLimit" min="0" value="5">
    <button id="updateWipBtn">Aktualizuj limit</button>
  </div>
  <div class="column-control">
    <input type="text" id="columnInput" placeholder="Nazwa kolumny">
    <input type="number" id="columnWipLimit" min="0" value="0" placeholder="Limit WIP">
    <button id="addColumnBtn">Dodaj kolumnę</button>
  </div>
</div>

<div class="board">
  <!-- Kolumny będą dodawane dynamicznie przez JavaScript -->
</div>

<script src="scripts.js"></script>
</body>
</html>
